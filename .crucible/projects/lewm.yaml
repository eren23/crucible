name: lewm
repo: https://github.com/lucas-maes/le-wm.git
branch: main
shallow: true
workspace: /workspace/le-wm

pod:
  gpu_type: "NVIDIA GeForce RTX 4090"
  container_disk: 40
  volume_disk: 80

python: "3.10"

install:
  - "stable-worldmodel[train,env]"
  - "datasets>=2.0,<3.0"
  - "huggingface_hub"
  - "zstandard"

install_torch: "torch==2.6.0 torchvision==0.21.0"
install_flags: "--index-url https://download.pytorch.org/whl/cu124"

launcher: lewm_upstream
launcher_entry: lewm_upstream.py

setup:
  - "export STABLEWM_HOME=/workspace/stable-wm-data && mkdir -p $STABLEWM_HOME && test -f $STABLEWM_HOME/pusht_expert_train.h5 && echo 'data exists' || python3 -c \"from huggingface_hub import hf_hub_download; import zstandard,os; os.makedirs('/workspace/stable-wm-data',exist_ok=True); p=hf_hub_download('quentinll/lewm-pusht','pusht_expert_train.h5.zst',repo_type='dataset',cache_dir='/workspace/hf_cache'); f=open(p,'rb'); o=open('/workspace/stable-wm-data/pusht_expert_train.h5','wb'); zstandard.ZstdDecompressor().copy_stream(f,o); f.close(); o.close(); os.remove(p); print('downloaded')\""
setup_timeout: 900

# TRAIN_SCRIPT defaults to the resolved launcher runtime path copied by bootstrap_project.
train: "LEWM_MODE=${LEWM_MODE:-slim} STABLEWM_HOME=/workspace/stable-wm-data python ${TRAIN_SCRIPT:-.crucible/launchers/lewm_upstream/lewm_upstream.py} data=pusht trainer.max_epochs=100 wandb.enabled=true wandb.config.entity=eren23 wandb.config.project=crucible-lewm"
timeout: 14400

env_forward:
  - WANDB_API_KEY
  - WANDB_ENTITY
  - COMPRESS
  - LEWM_MODE
  - LEWM_VARIANT
  - WANDA_SPARSITY
  - WANDA_PRUNE_EPOCH
  - QAT_WARMUP_EPOCHS
  - SLIM_DIM
  - SLIM_ENC_DEPTH
  - SLIM_PRED_DEPTH
  - SLIM_MAX_EPOCHS
  - SLIM_BATCH_SIZE
  - SLIM_NUM_WORKERS
  - SLIM_SIGREG_PROJ
  - TRAIN_SCRIPT

env_set:
  WANDB_PROJECT: crucible-lewm
  WANDB_MODE: online
  STABLEWM_HOME: /workspace/stable-wm-data

metrics:
  source: wandb
  primary: validate/pred_loss
  direction: minimize
