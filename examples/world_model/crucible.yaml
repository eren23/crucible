# Crucible config for world model example
# Run: python train_generic.py

project:
  name: world-model-example
  description: JEPA world model on bouncing balls — demonstrates video prediction with Crucible

training:
  - backend: generic
    script: train_generic.py
    modality: world_model

metrics:
  primary: pred_loss
  direction: minimize

presets:
  smoke:
    MODEL_FAMILY: jepa_wm
    DATA_ADAPTER: bouncing_balls
    ITERATIONS: "200"
    BATCH_SIZE: "8"
    IMAGE_SIZE: "32"
    IMAGE_CHANNELS: "3"
    NUM_FRAMES: "4"
    MODEL_DIM: "64"
    ACTION_DIM: "2"
    BASE_CHANNELS: "16"
    LR: "0.001"
    LOG_INTERVAL: "10"
    VAL_INTERVAL: "100"
    MAX_WALLCLOCK_SECONDS: "60"

  screen:
    MODEL_FAMILY: jepa_wm
    DATA_ADAPTER: bouncing_balls
    ITERATIONS: "5000"
    BATCH_SIZE: "32"
    IMAGE_SIZE: "32"
    IMAGE_CHANNELS: "3"
    NUM_FRAMES: "6"
    MODEL_DIM: "128"
    ACTION_DIM: "2"
    BASE_CHANNELS: "32"
    LR: "0.0003"
    LR_SCHEDULE: cosine
    WARMUP_STEPS: "100"
    LOG_INTERVAL: "50"
    VAL_INTERVAL: "500"
    MAX_WALLCLOCK_SECONDS: "3600"

  proxy:
    MODEL_FAMILY: jepa_wm
    DATA_ADAPTER: bouncing_balls
    ITERATIONS: "15000"
    BATCH_SIZE: "64"
    IMAGE_SIZE: "64"
    IMAGE_CHANNELS: "3"
    NUM_FRAMES: "8"
    MODEL_DIM: "256"
    ACTION_DIM: "2"
    BASE_CHANNELS: "64"
    PREDICTOR_HIDDEN: "512"
    LR: "0.0003"
    LR_SCHEDULE: cosine
    WARMUP_STEPS: "500"
    LOG_INTERVAL: "100"
    VAL_INTERVAL: "1500"
    MAX_WALLCLOCK_SECONDS: "7200"
