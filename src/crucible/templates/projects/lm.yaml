# description: Language model training (autoregressive transformer on a HuggingFace dataset). Defaults favor fineweb-style token-level training.
#
# Required variables:
#   PROJECT_NAME — the name of your LM project
#   REPO_URL     — URL of the git repo containing your training code
#
# Optional variables (with defaults):
#   BRANCH          — git branch (default: main)
#   GPU_TYPE        — RunPod GPU (default: NVIDIA GeForce RTX 4090)
#   CONTAINER_DISK  — container disk GB (default: 40 — LM checkpoints are big)
#   HF_DATASET      — HuggingFace dataset repo (default: HuggingFaceFW/fineweb-edu)
#   WANDB_PROJECT   — W&B project name (default: same as PROJECT_NAME)
#   MODEL_FAMILY    — architecture family (default: baseline)

extends: generic

name: ${PROJECT_NAME}
workspace: /workspace/${PROJECT_NAME}

pod:
  gpu_type: "${GPU_TYPE:NVIDIA GeForce RTX 4090}"
  gpu_count: 1
  container_disk: ${CONTAINER_DISK:40}

install_torch: "torch==2.6.0 torchvision==0.21.0"
install_flags: "--index-url https://download.pytorch.org/whl/cu124"

install:
  - "."
  - "wandb"
  - "datasets"
  - "transformers"
  - "huggingface_hub"

train: >-
  python train_gpt.py
  --preset ${PRESET:screen}
  --model-family ${MODEL_FAMILY:baseline}

timeout: 7200

env_forward:
  - WANDB_API_KEY
  - WANDB_ENTITY
  - HF_TOKEN
  - CRUCIBLE_VARIANT_NAME

env_set:
  WANDB_PROJECT: "${WANDB_PROJECT:${PROJECT_NAME}}"
  WANDB_MODE: online
  HF_DATASET: "${HF_DATASET:HuggingFaceFW/fineweb-edu}"

metrics:
  source: wandb
  primary: val_bpb
  direction: minimize
